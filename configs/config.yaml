data:
  raw_dir: "data/raw/RAVDESS"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  val_split: 0.15
  test_split: 0.15
  seed: 42

emotions:
  neutral:   0
  happy:     1
  sad:       2
  angry:     3
  fearful:   4
  disgust:   5
  num_classes: 6

video:
  fps: 30
  window_frames: 24
  face_size: 112
  stride: 12
  backbone: "efficientnet_b0"
  backbone_pretrained: true
  backbone_frozen_epochs: 5
  embed_dim: 1280

  tcn:
    num_levels: 5
    num_channels: 256
    kernel_size: 3
    dropout: 0.2

  train:
    epochs: 50
    batch_size: 12
    lr: 0.0001
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 3

audio:
  sample_rate: 16000
  max_duration_sec: 5.0
  model_name: "facebook/hubert-base-ls960"
  hidden_size: 768
  dropout: 0.3

  train:
    epochs: 30
    batch_size: 16
    lr: 0.00005
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 2
    freeze_feature_encoder: true

fusion:
  method: "weighted"
  alpha: 0.5
  hidden_dim: 256

  train:
    epochs: 20
    batch_size: 16
    lr: 0.0001

paths:
  video_model_ckpt: "checkpoints/video_best.pt"
  audio_model_ckpt: "checkpoints/audio_best.pt"
  fusion_model_ckpt: "checkpoints/fusion_best.pt"
