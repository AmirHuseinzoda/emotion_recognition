data:
  raw_dir: "data/raw/RAVDESS"
  cremad_dir: "data/raw/CREMA_D"
  cremad_audio_dir: "data/raw/CREMA_D_audio"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  seed: 42

emotions:
  neutral:   0
  happy:     1
  sad:       2
  angry:     3
  fearful:   4
  disgust:   5
  num_classes: 6

video:
  fps: 30
  window_frames: 32          # увеличено с 24 — больше контекста для Bi-LSTM
  face_size: 112
  stride: 12
  backbone: "efficientnet_b0"
  backbone_pretrained: true
  backbone_frozen_epochs: 5
  embed_dim: 1280

  tcn:                       # параметры сохранены для совместимости API (Bi-LSTM их игнорирует)
    num_levels: 5
    num_channels: 256
    kernel_size: 3
    dropout: 0.4

  train:
    epochs: 50
    batch_size: 12
    lr: 0.0001
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 3
    focal_gamma: 2.0
    label_smoothing: 0.1
    mixup_alpha: 0.4
    weighted_sampler: true
    early_stopping_patience: 8

audio:
  sample_rate: 16000
  max_duration_sec: 5.0
  model_name: "microsoft/wavlm-large"   # WavLM-Large: +5-8% SER vs HuBERT-base
  hidden_size: 1024                      # hidden_size WavLM-Large (768 у HuBERT-base)
  dropout: 0.3

  train:
    epochs: 30
    batch_size: 8                         # уменьшен для WavLM-Large (300M params)
    lr: 0.00005
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 2
    freeze_feature_encoder: true
    focal_gamma: 2.0
    label_smoothing: 0.1
    mixup_alpha: 0.4
    weighted_sampler: true
    early_stopping_patience: 8

fusion:
  method: "attention"
  alpha: 0.5
  hidden_dim: 256

  train:
    epochs: 20                             # Фаза 1: только fusion-слой
    batch_size: 16
    lr: 0.0001
    focal_gamma: 2.0
    label_smoothing: 0.1
    early_stopping_patience: 6
    joint_finetune: true                   # Фаза 2: совместное обучение
    joint_finetune_epochs: 10
    joint_finetune_lr: 0.000005            # малый LR для базовых моделей
    aux_loss_weight: 0.3                   # вес auxiliary loss (видео + аудио)

paths:
  video_model_ckpt: "checkpoints/video_best.pt"
  audio_model_ckpt: "checkpoints/audio_best.pt"
  fusion_model_ckpt: "checkpoints/fusion_best.pt"
